name: Deploy .NET to FTP on main push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./MJOPCalculator/MJOPCalculator.csproj

      - name: Publish
        run: dotnet publish ./MJOPCalculator/MJOPCalculator.csproj -c Release -o ./publish

      - name: Write deploy info
        run: |
          echo "${{ github.sha }}" > ./publish/deploy-info.txt
          mv ./MJOPCalculator/dllpointer ./publish/dllpointer

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy publish/ to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" << EOF
          set cmd:fail-exit true
          set net:max-retries 1
          set net:timeout 20
          set ftp:ssl-allow false
          set ftp:passive-mode yes

          cd "$FTP_REMOTE_DIR"

          mirror -R --delete ./publish .

          bye
          EOF
